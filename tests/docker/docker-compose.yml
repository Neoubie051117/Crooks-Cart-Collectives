# docker/docker-compose.yml
services:
  web:
    # Build from local Dockerfile instead of pulling image
    build: ./php
    container_name: crooks_web
    ports:
      - "8080:80"
    volumes:
      - ../:/var/www/html
    depends_on:
      database:
        condition: service_healthy
    networks:
      - crooks_network
    # This container will work offline after initial build

  database:
    image: mysql:5.7
    container_name: crooks_mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: crooks_cart_collectives
    ports:
      - "3306:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./mysql/init.sql:/docker-entrypoint-initdb.d/01-init.sql
      - ./mysql/dummy_data.sql:/docker-entrypoint-initdb.d/02-dummy_data.sql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-uroot", "-proot"]
      timeout: 20s
      retries: 10
      interval: 10s
    networks:
      - crooks_network

  phpmyadmin:
    image: phpmyadmin/phpmyadmin
    container_name: crooks_phpmyadmin
    restart: always
    ports:
      - "8081:80"
    environment:
      PMA_HOST: database
      PMA_USER: root
      PMA_PASSWORD: root
      PMA_PORT: 3306
      UPLOAD_LIMIT: 100M
    depends_on:
      database:
        condition: service_healthy
    networks:
      - crooks_network

  adminer:
    image: adminer
    container_name: crooks_adminer
    restart: always
    ports:
      - "8082:8080"
    environment:
      ADMINER_DEFAULT_SERVER: database
    depends_on:
      database:
        condition: service_healthy
    networks:
      - crooks_network

networks:
  crooks_network:
    driver: bridge

volumes:
  mysql_data: